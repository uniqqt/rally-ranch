<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="ring" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#d4a820"/>
      <stop offset="30%"  stop-color="#f0d060"/>
      <stop offset="60%"  stop-color="#c89820"/>
      <stop offset="100%" stop-color="#7a600a"/>
    </linearGradient>
    <path id="topArc"  d="M 72,260 A 180,180 0 0,1 428,260"/>
    <clipPath id="circle"><circle cx="250" cy="250" r="228"/></clipPath>
  </defs>

  <!-- Gold ring -->
  <circle cx="250" cy="250" r="248" fill="url(#ring)"/>
  <!-- Dark grey fill -->
  <circle cx="250" cy="250" r="228" fill="#5f5f5f"/>

  <!-- RALLY RANCH arced text -->
  <text font-family="'Arial Black','Impact',sans-serif" font-size="48" fill="white"
        font-weight="900" letter-spacing="7">
    <textPath href="#topArc" startOffset="9%">RALLY RANCH</textPath>
  </text>

  <!-- ESTD / TD (left) -->
  <text x="108" y="268" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" fill="white" font-weight="600" letter-spacing="1">ES</text>
  <text x="108" y="292" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" fill="white" font-weight="600" letter-spacing="1">TD</text>

  <!-- 20 / 26 (right) -->
  <text x="392" y="268" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" fill="white" font-weight="600" letter-spacing="1">20</text>
  <text x="392" y="292" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" fill="white" font-weight="600" letter-spacing="1">26</text>

  <!-- ── Left paddle (rotated –35°) ── -->
  <g transform="translate(250,275) rotate(-35) translate(-250,-275)">
    <rect x="240" y="320" width="20" height="58" rx="6" fill="#2a2a2a"/>
    <rect x="202" y="228" width="82" height="100" rx="18" fill="#e6c838"/>
    <rect x="202" y="228" width="82" height="100" rx="18" fill="none"
          stroke="#2a2a2a" stroke-width="4"/>
  </g>

  <!-- ── Right paddle (rotated +35°) ── -->
  <g transform="translate(250,275) rotate(35) translate(-250,-275)">
    <rect x="240" y="320" width="20" height="58" rx="6" fill="#2a2a2a"/>
    <rect x="216" y="228" width="82" height="100" rx="18" fill="#e6c838"/>
    <rect x="216" y="228" width="82" height="100" rx="18" fill="none"
          stroke="#2a2a2a" stroke-width="4"/>
  </g>

  <!-- ── Pickleball ── -->
  <circle cx="250" cy="180" r="35" fill="#e6c838"/>
  <circle cx="250" cy="180" r="35" fill="none" stroke="#2a2a2a" stroke-width="3.5"/>
  <!-- Holes -->
  <circle cx="240" cy="172" r="5"   fill="#5f5f5f"/>
  <circle cx="260" cy="172" r="5"   fill="#5f5f5f"/>
  <circle cx="250" cy="189" r="5"   fill="#5f5f5f"/>
  <circle cx="233" cy="186" r="4.5" fill="#5f5f5f"/>
  <circle cx="267" cy="186" r="4.5" fill="#5f5f5f"/>
  <circle cx="243" cy="163" r="3.5" fill="#5f5f5f"/>
  <circle cx="257" cy="163" r="3.5" fill="#5f5f5f"/>

  <!-- PICKLEBALL -->
  <text x="250" y="376" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="46" fill="white" font-weight="900" font-style="italic" letter-spacing="2">
    PICKLEBALL
  </text>

  <!-- BUILT FOR THE LONG RALLY -->
  <text x="250" y="404" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="16" fill="#dddddd" letter-spacing="3.5">BUILT FOR THE</text>
  <text x="250" y="424" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="16" fill="#dddddd" letter-spacing="3.5">LONG RALLY</text>
</svg>
